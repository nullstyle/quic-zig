[tools]
# Zig 0.17 is unreleased, so we track master. Last build verified green
# (test + ReleaseSafe + conformance): 0.17.0-dev.1158+1d1193aa7, which is
# the floor recorded in build.zig.zon `minimum_zig_version`. Bump both
# together after re-verifying against a newer master.
zig = "master"
just = "1.49.0"
python = "3.12.13"
uv = "0.11.3"

[env]
ZIG_GLOBAL_CACHE_DIR = "{{config_root}}/.zig-global-cache"

[tasks.test]
description = "Run the quic-zig Zig test suite"
run = "zig build test"

[tasks.fuzz]
# CAVEAT: this parallel step (`zig build fuzz -j<N>`, one binary per site)
# currently aborts under the Zig fuzz coordinator with "reached unreachable
# code" on BOTH Linux and macOS — an upstream limitation
# (ziglang/zig#25352, hard-coded n_instances = 1). The working deep-fuzz
# path, and what CI runs (.github/workflows/fuzz.yml, ubuntu-latest), is the
# single-instance runner:
#     zig build test --fuzz=1M --test-filter "fuzz: open1Rtt"
# On macOS the std.testing.fuzz runtime aborts even single-instance (a
# platform gap, reproduced with a trivial standalone test on
# 0.17.0-dev.1158). The one-shot fuzz-smoke run under `zig build test` works
# everywhere. See CONTRIBUTING.md "Fuzzing".
description = "Coverage-guided fuzzing (parallel; see note — currently blocked upstream)"
run = "zig build fuzz --fuzz=10M -j$(sysctl -n hw.ncpu 2>/dev/null || nproc)"

[tasks.qns-endpoint]
description = "Build the QNS endpoint binary"
run = "zig build qns-endpoint"

[tasks.interop-preflight]
description = "Check local external interop prerequisites"
run = "zig build external-interop -- preflight"

[tasks.interop-build-image]
description = "Build the quic-zig QNS Docker image"
run = "zig build external-interop -- build-image"
