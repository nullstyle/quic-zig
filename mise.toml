[tools]
# Zig 0.17 is unreleased, so we track master. Last build verified green
# (test + ReleaseSafe + conformance): 0.17.0-dev.1158+1d1193aa7, which is
# the floor recorded in build.zig.zon `minimum_zig_version`. Bump both
# together after re-verifying against a newer master.
zig = "master"
just = "1.49.0"
python = "3.12.13"
uv = "0.11.3"

[env]
ZIG_GLOBAL_CACHE_DIR = "{{config_root}}/.zig-global-cache"

[tasks.test]
description = "Run the quic-zig Zig test suite"
run = "zig build test"

[tasks.fuzz]
# Deep coverage-guided fuzzing on the unfiltered test binary — the only
# invocation that works on 0.17.0-dev.1158 (a *filtered* test binary under
# --fuzz aborts the build-runner; ziglang/zig#25352). Single-instance
# (n_instances = 1), so it saturates one core and rotates across sites. This
# is exactly what CI runs (.github/workflows/fuzz.yml, ubuntu-latest); the
# fuzz runtime aborts on macOS regardless, so run it on Linux. See
# CONTRIBUTING.md "Fuzzing".
description = "Deep coverage-guided fuzzing (single-instance, unfiltered; Linux)"
run = "zig build test --fuzz=10M"

[tasks.qns-endpoint]
description = "Build the QNS endpoint binary"
run = "zig build qns-endpoint"

[tasks.interop-preflight]
description = "Check local external interop prerequisites"
run = "zig build external-interop -- preflight"

[tasks.interop-build-image]
description = "Build the quic-zig QNS Docker image"
run = "zig build external-interop -- build-image"
