[tools]
# Zig 0.17 is unreleased, so we track master. Last build verified green
# (test + ReleaseSafe + conformance): 0.17.0-dev.1158+1d1193aa7, which is
# the floor recorded in build.zig.zon `minimum_zig_version`. Bump both
# together after re-verifying against a newer master.
zig = "master"
just = "1.49.0"
python = "3.12.13"
uv = "0.11.3"

[env]
ZIG_GLOBAL_CACHE_DIR = "{{config_root}}/.zig-global-cache"

[tasks.test]
description = "Run the quic-zig Zig test suite"
run = "zig build test"

[tasks.fuzz]
# Deep coverage-guided fuzzing, every site in its own single-instance
# process (Linux). Avoids `zig build fuzz -j<N>`, which multiplexes N sites
# through one build-runner fuzz coordinator and aborts upstream
# ("reached unreachable code"; ziglang/zig#25352) on both Linux and macOS.
# The per-process topology matches `zig build test --fuzz`, which is what CI
# runs (.github/workflows/fuzz.yml, ubuntu-latest). On macOS the fuzz
# runtime aborts regardless — run this on Linux. See CONTRIBUTING.md.
description = "Deep coverage-guided fuzzing, one process per site (Linux)"
run = "./scripts/fuzz-parallel.sh"

[tasks.qns-endpoint]
description = "Build the QNS endpoint binary"
run = "zig build qns-endpoint"

[tasks.interop-preflight]
description = "Check local external interop prerequisites"
run = "zig build external-interop -- preflight"

[tasks.interop-build-image]
description = "Build the quic-zig QNS Docker image"
run = "zig build external-interop -- build-image"
