name: fuzz

on:
  schedule:
    # Sunday 09:00 UTC, just after the interop run.
    - cron: "0 9 * * 0"
  workflow_dispatch:
    inputs:
      iterations:
        description: "Per-target iteration budget (e.g. 100K, 1M)"
        required: false
        default: "100K"

# Coverage-guided fuzzing of the wire / frame / server header-peek
# parsers. The harness lives next to the unit tests in src/wire/,
# src/frame/, and src/server.zig (every `std.testing.fuzz` site).
# Crashes save to .zig-cache/v/; the artifact upload preserves them
# so we can replay locally.
jobs:
  fuzz:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 60
    env:
      ITERS: ${{ github.event.inputs.iterations || '100K' }}
    steps:
      - name: Checkout quic-zig
        uses: actions/checkout@v7

      - name: Set up mise (zig master + project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: |
            .zig-global-cache
            zig-pkg
          key: zig-pkg-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkg-

      # GitHub's tarball/raw endpoints flake (504s, DNS) often enough to fail
      # real runs. Prefetch the full dependency tree with retries so a bad
      # window costs seconds, not a red CI run; the cache above makes even
      # that rare.
      - name: Prefetch Zig dependencies (retry on network flake)
        run: |
          for i in 1 2 3 4 5; do
            if zig build --fetch; then exit 0; fi
            echo "fetch attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::dependency prefetch failed after 5 attempts"
          exit 1

      - name: zig build test --fuzz
        run: zig build test --fuzz=$ITERS

      - name: Upload corpus + crashes
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-cache-${{ github.run_id }}
          path: .zig-cache/v
          if-no-files-found: ignore
          retention-days: 30
