name: QNS Image

on:
  schedule:
    - cron: "13 13 * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-qns
  push_build: false
  trigger_build: false
  publish_image: ${{ vars.QNS_IMAGE_PUBLISH || 'false' }}
  commit_id: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout quic-zig
        uses: actions/checkout@v4
        with:
          path: quic-zig

      - name: Install image inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq skopeo

      - name: Look up commit ID labelled on the latest published image
        run: |
          LATEST_IMAGE_COMMIT=$(skopeo inspect "docker://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" 2>/dev/null | jq -r '.Labels.commit_id' || echo "none")
          echo "latest_image_commit=$LATEST_IMAGE_COMMIT" >> "$GITHUB_ENV"

      - name: Decide whether to rebuild
        run: |
          if [ "${commit_id}" != "${latest_image_commit}" ]; then
            echo "quic-zig commit changed; rebuilding."
            echo "trigger_build=true" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch; rebuilding."
            echo "trigger_build=true" >> "$GITHUB_ENV"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Pull request; building without push to validate."
            echo "trigger_build=true" >> "$GITHUB_ENV"
          else
            echo "Image already at ${latest_image_commit}; skipping."
            echo "trigger_build=false" >> "$GITHUB_ENV"
          fi

      - name: Decide whether to push
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && env.publish_image == 'true'
        run: echo "push_build=true" >> "$GITHUB_ENV"

      - name: Login to GitHub Container Registry
        if: env.push_build == 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: env.trigger_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Prepare Docker context shape
        if: env.trigger_build == 'true'
        run: mkdir -p zig-cache-p

      - name: Build and push QNS image
        if: env.trigger_build == 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: quic-zig/interop/qns/Dockerfile
          pull: true
          push: ${{ env.push_build }}
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.commit_id }}
          labels: |
            commit_id=${{ env.commit_id }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.commit_id }}
