name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# quic-zig tracks the project toolchain via mise.toml, so CI uses
# jdx/mise-action to install the same Zig and helper tools as local
# development. boringssl-zig is a URL+hash dep, so Zig fetches it
# itself during build.
jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        # Linux, macOS, and Windows are tier-1 hard gates for 1.0.
        # See docs/RELEASE_READINESS.md for platform tier policy.
        os: [ubuntu-latest, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    # Run every step under bash so the toolchain step's `uname` works on
    # the Windows runner too (Git Bash ships on windows-latest).
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout quic-zig
        uses: actions/checkout@v7

      - name: Set up mise (project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Print toolchain
        run: |
          zig version
          uname -a

      - name: zig build
        run: zig build --summary all

      - name: zig build test
        run: zig build test --summary all

  sanitizer:
    name: sanitizer (sanitize-c=full)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout quic-zig
        uses: actions/checkout@v7

      - name: Set up mise (project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: zig build test -Dsanitize-c=full
        run: zig build test -Dsanitize-c=full --summary all
