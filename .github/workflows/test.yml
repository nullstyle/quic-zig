name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# quic-zig tracks the project toolchain via mise.toml, so CI uses
# jdx/mise-action to install the same Zig and helper tools as local
# development. boringssl-zig is a URL+hash dep, so Zig fetches it
# itself during build.
jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        # Linux, macOS 15, and Windows are tier-1 hard gates for 1.0.
        # macOS 26 is advisory while the next hosted image generation settles.
        # See docs/RELEASE_READINESS.md for platform tier policy.
        include:
          - os: ubuntu-latest
            advisory: false
          - os: macos-15
            advisory: false
          - os: windows-latest
            advisory: false
          - os: macos-26
            advisory: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.advisory }}
    # Run every step under bash so the toolchain step's `uname` works on
    # the Windows runner too (Git Bash ships on windows-latest).
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout quic-zig
        uses: actions/checkout@v7

      - name: Set up mise (project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Print toolchain
        run: |
          zig version
          uname -a

      - name: zig build
        run: zig build --summary all

      - name: zig build test
        run: zig build test --summary all

      # End-to-end echo example smoke: server loop on a thread, client
      # loop over real loopback UDP, non-zero exit unless the stream +
      # datagram round-trip happened. Linux-only: it is a real-socket /
      # real-thread harness, and one tier-1 leg is enough signal.
      - name: zig build run-echo-smoke
        if: matrix.os == 'ubuntu-latest'
        run: zig build run-echo-smoke

      # Out-of-tree consumer smoke: builds a separate package that
      # depends on quic-zig by path and pins the exported quic_zig +
      # boringssl module surface (type identity for
      # Client.Config.tls_context_override consumers).
      - name: consumer-smoke (out-of-tree package)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd tools/consumer-smoke
          zig build --summary all
          zig build run

  sanitizer:
    name: sanitizer (sanitize-c=full)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout quic-zig
        uses: actions/checkout@v7

      - name: Set up mise (project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: zig build test -Dsanitize-c=full
        run: zig build test -Dsanitize-c=full --summary all
