name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# quic-zig tracks the project toolchain via mise.toml, so CI uses
# jdx/mise-action to install the same Zig and helper tools as local
# development. boringssl-zig is a URL+hash dep, so Zig fetches it
# itself during build.
jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        # Linux + macOS are tier-1 hard gates. Windows is a tier-1 target
        # for 1.0 but still has known gaps, so it runs advisory
        # (continue-on-error below) to produce signal without blocking.
        # Graduating it = dropping continue-on-error. See
        # docs/RELEASE_READINESS.md.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    # Run every step under bash so the toolchain step's `uname` works on
    # the Windows runner too (Git Bash ships on windows-latest).
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout quic-zig
        uses: actions/checkout@v4

      - name: Set up mise (project tools)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Print toolchain
        run: |
          zig version
          uname -a

      - name: zig build
        run: zig build --summary all

      - name: zig build test
        run: zig build test --summary all

  sanitizer:
    name: sanitizer (sanitize-c=full)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout quic-zig
        uses: actions/checkout@v4

      - name: Set up mise (project tools)
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: zig build test -Dsanitize-c=full
        run: zig build test -Dsanitize-c=full --summary all
