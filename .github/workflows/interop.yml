name: interop

on:
  schedule:
    # Sunday 06:00 UTC. Interop is environment-sensitive and slow,
    # so we run it weekly rather than on every push.
    - cron: "0 6 * * 0"
  workflow_dispatch:
    inputs:
      tests:
        description: "QNS test letters (comma-separated)"
        required: false
        default: "H,D,C,M"
      clients:
        description: "Client matrix"
        required: false
        default: "quic-go,quiche,ngtcp2"

# Interop runs are intentionally tolerant: a regression here is a
# signal to investigate, not a hard merge gate. The test workflow
# (test.yml) is the actual CI gate.
jobs:
  qns-server:
    name: QNS interop (quic-zig as server)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 90
    env:
      QUIC_INTEROP_RUNNER_REF: 1d6f6554ac8e3b7c4cca0e3d40fd69f661420673
      QUIC_GO_IMAGE: martenseemann/quic-go-interop@sha256:37db4402341f81981ffba01a6fa532d378f165a6fa8dd2b902f33549383d0077
      QUIC_ZIG_IMAGE: quic-zig-qns:local
      TESTS: ${{ github.event.inputs.tests || 'H,D,C,M' }}
      CLIENTS: ${{ github.event.inputs.clients || 'quic-go,quiche,ngtcp2' }}
    steps:
      - name: Checkout quic-zig
        uses: actions/checkout@v7
        with:
          path: quic-zig

      - name: Checkout quic-interop-runner
        uses: actions/checkout@v7
        with:
          repository: quic-interop/quic-interop-runner
          ref: ${{ env.QUIC_INTEROP_RUNNER_REF }}
          path: quic-interop-runner

      - name: Set up mise (project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
          working_directory: quic-zig

      - name: Install runner deps
        working-directory: quic-interop-runner
        run: pip install -r requirements.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build QNS image from quic-zig
        working-directory: quic-zig
        run: |
          zig build external-interop -- build-image --image "${QUIC_ZIG_IMAGE}"

      - name: Run QNS interop (server role)
        working-directory: quic-zig
        env:
          RUNNER_DIR: ${{ github.workspace }}/quic-interop-runner
        run: |
          zig build external-interop -- runner \
            --role server \
            --runner-dir "${RUNNER_DIR}" \
            --image "${QUIC_ZIG_IMAGE}" \
            --clients "${CLIENTS}" \
            --tests "${TESTS}" \
            --quic-go-image "${QUIC_GO_IMAGE}" \
            --log-dir "${{ github.workspace }}/interop-logs" \
            --json "${{ github.workspace }}/interop-logs/result.json"

      - name: Upload interop logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: interop-logs-${{ github.run_id }}
          path: |
            interop-logs/**
          if-no-files-found: warn
          retention-days: 14
