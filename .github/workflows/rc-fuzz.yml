name: rc-fuzz

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: "Coverage-guided fuzz iteration budget (for example 1M, 5M)"
        required: false
        default: "1M"

# Manual pre-release gate for 1.0 RC preparation. The scheduled fuzz workflow
# remains advisory; this one is intentionally blocking and must be green before
# tagging an RC-prep or RC release.
jobs:
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      ITERS: ${{ github.event.inputs.iterations || '1M' }}
    steps:
      - name: Checkout quic-zig
        uses: actions/checkout@v7

      - name: Set up mise (project tools)
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Cache Zig packages
        uses: actions/cache@v4
        with:
          path: |
            .zig-global-cache
            zig-pkg
          key: zig-pkg-${{ hashFiles('build.zig.zon') }}
          restore-keys: zig-pkg-

      # GitHub's tarball/raw endpoints flake (504s, DNS) often enough to fail
      # real runs. Prefetch the full dependency tree with retries so a bad
      # window costs seconds, not a red CI run; the cache above makes even
      # that rare.
      - name: Prefetch Zig dependencies (retry on network flake)
        run: |
          for i in 1 2 3 4 5; do
            if zig build --fetch; then exit 0; fi
            echo "fetch attempt $i failed; retrying in $((i * 10))s"
            sleep $((i * 10))
          done
          echo "::error::dependency prefetch failed after 5 attempts"
          exit 1

      - name: zig build test --fuzz
        shell: bash
        run: |
          set +e
          rm -rf .zig-cache/v
          zig build test --fuzz="$ITERS" 2>&1 | tee rc-fuzz.log
          status=${PIPESTATUS[0]}
          set -e

          if [ "$status" -eq 0 ]; then
            exit 0
          fi

          if grep -q "corrupted coverage file .*pcs_len was zero" rc-fuzz.log; then
            echo "::warning::Zig fuzz coverage metadata was corrupted; retrying once with a clean fuzz cache"
            rm -rf .zig-cache/v
            set +e
            zig build test --fuzz="$ITERS" 2>&1 | tee -a rc-fuzz.log
            retry_status=${PIPESTATUS[0]}
            set -e
            exit "$retry_status"
          fi

          exit "$status"

      - name: Upload corpus, crashes, and log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rc-fuzz-cache-${{ github.run_id }}
          path: |
            .zig-cache/v
            rc-fuzz.log
          if-no-files-found: ignore
          retention-days: 30
